<!DOCTYPE html>
<html>

<head>
    <title>Simple Blog</title>
    <link rel="stylesheet" href="FinalProject.css">
</head>

<body>

    <h1>My Simple Blog</h1>

    <div class="form">

        <input type="text" id="title" placeholder="Enter blog title">

        <textarea id="content" placeholder="Write your blog..."></textarea>

        <p id="charCount">0 characters</p>

        <button id="postBtn">Publish Post</button>

    </div>

    <h2>All Posts</h2>

    <div id="posts"></div>

    <script src="FinalProject.js"></script>

</body>

</html>
